---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% if page.author %} • {{ page.author }}{% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}">← Back to Home</a>
  </footer>
</article>

<style>
.post-header {
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid #e1e4e8;
}

.post-header h1 {
  margin-bottom: 0.5rem;
}

.post-meta {
  color: #586069;
  font-size: 0.9rem;
}

.post-content {
  line-height: 1.8;
}

.post-content h2 {
  margin-top: 2rem;
}

.post-content img,
.post-content video {
  width: 100%;
  max-width: 700px;
  display: block;
  margin: 2rem auto;
  outline: none;
  border: none;
}

.post-content video[src$=".mov"] {
  clip-path: inset(1%);
}

.post-content video:focus {
  outline: none;
}

.post-content pre {
  background: #f6f8fa;
  padding: 1rem;
  border-radius: 6px;
  overflow-x: auto;
}

.post-content code {
  background: #f6f8fa;
  padding: 0.2rem 0.4rem;
  border-radius: 3px;
  font-size: 0.9em;
}

.post-content pre code {
  background: none;
  padding: 0;
}

.post-content blockquote {
  border-left: 4px solid #0366d6;
  margin: 1rem 0;
  padding-left: 1rem;
  color: #586069;
}

.post-footer {
  margin-top: 3rem;
  padding-top: 1rem;
  border-top: 1px solid #e1e4e8;
}
</style>
