<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="keywords" content="self-distillation, privileged information distillation, knowledge distillation, language models, reinforcement learning, variational inference, KL divergence, pi-Distill, reward-tilted distillation, on-policy distillation, RLHF, LLM training, RL-as-inference, forward-KL, reverse-KL, SFT">
  <meta name="author" content="{% if page.authors %}{% for a in page.authors %}{{ a.name }}{% unless forloop.last %}, {% endunless %}{% endfor %}{% else %}Emiliano Penaloza{% endif %}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.date %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ScholarlyArticle",
    "headline": "{{ page.title | default: site.title }}",
    "description": "{{ page.description | default: site.description }}",
    "author": [{% if page.authors %}{% for a in page.authors %}{"@type": "Person", "name": "{{ a.name }}"{% if a.url %}, "url": "{{ a.url }}"{% endif %}}{% unless forloop.last %}, {% endunless %}{% endfor %}{% else %}{"@type": "Person", "name": "Emiliano Penaloza"}{% endif %}],
    {% if page.date %}"datePublished": "{{ page.date | date: '%Y-%m-%d' }}",{% endif %}
    "keywords": "self-distillation, privileged information distillation, knowledge distillation, language models, reinforcement learning, variational inference, pi-Distill",
    "about": [
      { "@type": "Thing", "name": "Self-Distillation" },
      { "@type": "Thing", "name": "Privileged Information Distillation" },
      { "@type": "Thing", "name": "Knowledge Distillation" },
      { "@type": "Thing", "name": "Reinforcement Learning" },
      { "@type": "Thing", "name": "Language Models" }
    ]
  }
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  {% include mathjax.html %}
  <style>
    body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
      background-color: #ffffff;
      color: #24292e;
    }
    h1, h2, h3, h4, h5, h6 {
      color: #24292e;
    }
    details {
      background: #ffffff !important;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 0;
      margin: 1rem 0;
    }
    details summary {
      cursor: pointer;
      color: #24292e !important;
      font-weight: bold;
      background: #ffffff !important;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    details summary strong {
      color: #24292e !important;
    }
    details summary::before {
      content: "▶";
      font-size: 0.7em;
      transition: transform 0.2s;
    }
    details[open] summary::before {
      transform: rotate(90deg);
    }
    details summary::-webkit-details-marker {
      display: none;
    }
    details[open] summary {
      border-bottom: 1px solid #d0d7de;
      border-radius: 8px 8px 0 0;
    }
    details > *:not(summary) {
      padding: 0 1rem;
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>

  <footer style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e1e4e8; color: #586069;">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
  </footer>
</body>
</html>
