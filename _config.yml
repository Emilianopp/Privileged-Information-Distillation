# Site settings
title: "Understanding Self-Distillation and Privileged Information Distillation"
description: "An introductory guide to self-distillation and privileged information distillation for language models. Covers RL-as-inference, forward-KL (SFT), reverse-KL self-distillation, reward-tilted distillation, variational EM, and pi-Distill with interactive visualizations."
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site

# SEO
lang: en
keywords:
  - self-distillation
  - privileged information distillation
  - knowledge distillation
  - language models
  - reinforcement learning
  - variational inference
  - KL divergence
  - pi-Distill
  - reward-tilted distillation
  - on-policy distillation
  - RLHF
  - LLM training

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: "mathjax"

# Permalink style
permalink: pretty

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
